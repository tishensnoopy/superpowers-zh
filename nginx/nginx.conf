# ============================================================================
# Nginx 反向代理配置 —— 佑森小课堂单机部署
# 用法：与 docker-compose.nginx.yml 一起使用
# ============================================================================
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;
    # 客户端请求体大小限制（Strapi 上传默认 2GB，预留足够空间）
    client_max_body_size 2560M;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # 上游服务（docker compose 服务名）
    upstream backend {
        server backend:1337;
        keepalive 32;
    }
    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # 安全相关 header
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ---- Strapi 后端 API ----
        # /api/* 路由到 backend
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            # Strapi API 可能需要较长响应时间（AI 客服 / RAG 检索）
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ---- Strapi 管理后台 ----
        location /admin {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ---- Strapi 上传文件 ----
        location /uploads/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Connection "";
            # 静态资源缓存
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ---- Strapi 健康检查端点 ----
        location = /_health {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ---- Next.js 前端（默认路由）----
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            # Next.js HMR (开发模式，生产环境无副作用)
            proxy_read_timeout 86400;
        }

        # 错误页面（避免暴露内部错误）
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            default_type text/html;
            return 503 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>服务暂时不可用</title></head><body style="font-family:sans-serif;text-align:center;padding:50px;"><h1>服务暂时不可用</h1><p>服务器正在维护中，请稍后再试。</p></body></html>';
        }
    }
}
