services:
  postgres:
    image: postgres:16-alpine
    container_name: central-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: control_db
      POSTGRES_USER: central
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-changeme}
    volumes:
      - central_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U central -d control_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  central:
    build: .
    container_name: central-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://central:${DATABASE_PASSWORD:-changeme}@postgres:5432/control_db
      JWT_SECRET: ${JWT_SECRET}
      AES_KEY: ${AES_KEY}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
      CENTRAL_DOMAIN: ${CENTRAL_DOMAIN}
      # bundle 发布包管道：代码仓库路径（git archive 来源）+ bundle 存储目录 + agent 下载 base URL
      CENTRAL_CODE_REPO: /opt/central-code-repo
      CENTRAL_BUNDLE_DIR: /data/bundles
      CENTRAL_PUBLIC_URL: ${CENTRAL_PUBLIC_URL:-}
      NODE_ENV: production
    volumes:
      # 代码仓库只读挂载（git archive 来源，需先在宿主机 clone）
      - ${CENTRAL_CODE_REPO_HOST:-/opt/central-code-repo}:/opt/central-code-repo:ro
      # bundle 持久化（容器重建不丢，否则 agent 下载 410）
      - central_bundles:/data/bundles
    ports:
      - "${CENTRAL_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/login"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # seed 仅首次手动执行（npx tsx db/seed.ts），避免每次重启重复写入
    command: sh -c "npx tsx db/migrate.ts && npm start"

volumes:
  central_pgdata:
  central_bundles:
