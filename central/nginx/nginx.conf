# Central nginx 配置
# 部署前将 central.yousen.example.com 替换为实际域名（与 Let's Encrypt 证书 CN 一致）
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;

    # 上传配置文件可能较大
    client_max_body_size 256M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    upstream central {
        server central:3000;
        keepalive 32;
    }

    # ------------------------------------------------------------
    # HTTP 80 —— 重定向到 HTTPS（/healthz 除外，供 healthcheck 使用）
    # ------------------------------------------------------------
    server {
        listen 80;
        server_name central.yousen.example.com;

        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'ok';
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ------------------------------------------------------------
    # HTTPS 443 —— 主服务
    # ------------------------------------------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name central.yousen.example.com;

        # Let's Encrypt 证书路径（需先 certbot 申请）
        ssl_certificate /etc/letsencrypt/live/central.yousen.example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/central.yousen.example.com/privkey.pem;

        # SSL 协议与加密套件
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 安全响应头
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # --------------------------------------------------------
        # WebSocket：Agent 长连接
        # --------------------------------------------------------
        location /api/agent/ws {
            proxy_pass http://central;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # --------------------------------------------------------
        # SSE：任务日志流（关闭 buffering）
        # --------------------------------------------------------
        location /api/admin/jobs/ {
            proxy_pass http://central;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        # --------------------------------------------------------
        # 默认：Next.js 应用
        # --------------------------------------------------------
        location / {
            proxy_pass http://central;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # 错误页面
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            default_type text/html;
            return 503 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Central 不可用</title></head><body><h1>Central 服务暂时不可用</h1><p>请稍后重试，或联系管理员。</p></body></html>';
        }
    }
}
