# Central nginx overlay —— 与 docker-compose.yml 一起使用
# 用法：docker compose -f docker-compose.yml -f docker-compose.nginx.yml up -d
services:
  nginx:
    image: nginx:alpine
    container_name: central-nginx
    restart: unless-stopped
    depends_on:
      central:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
