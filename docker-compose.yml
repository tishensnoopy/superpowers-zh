# ============================================================================
# 统一 Docker Compose 编排
# 包含: postgres + redis + meilisearch + backend + frontend
# ============================================================================
#
# 用法:
#   首次启动（分步，确保 backend 先启动供 frontend 构建时 SSG 取数据）:
#     1. cp .env.example .env  并填入实际值
#     2. docker compose up -d postgres redis meilisearch backend
#     3. 等 backend 健康后: docker compose up -d --build frontend
#
#   后续启动（镜像已构建）:
#     docker compose up -d
#
#   查看日志:
#     docker compose logs -f backend
#
#   停止:
#     docker compose down
#
#   清理数据卷（慎用，会丢失数据）:
#     docker compose down -v
# ============================================================================

services:
  # ---- PostgreSQL 数据库（pgvector 扩展支持向量搜索）----
  postgres:
    image: pgvector/pgvector:pg16
    container_name: yousen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-strapi}
      POSTGRES_USER: ${DATABASE_USERNAME:-strapi}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-changeme}
    ports:
      # 仅绑定宿主机回环地址，避免数据库端口暴露公网（R26）
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-strapi} -d ${DATABASE_NAME:-strapi}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # 容器资源限制（R11）
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---- Redis（BullMQ 队列 + 缓存）----
  redis:
    image: redis:7-alpine
    container_name: yousen-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      # 仅绑定宿主机回环地址，避免 Redis 端口暴露公网（R26）
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # 容器资源限制（R11）
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---- Meilisearch（产品搜索）----
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: yousen-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-changeme_master_key_12345}
      # 生产模式（R30）：development 模式会暴露调试路由
      MEILI_ENV: ${MEILI_ENV:-production}
    ports:
      # 仅绑定宿主机回环地址，避免搜索端口暴露公网（R26）
      - "127.0.0.1:${MEILI_PORT:-7700}:7700"
    volumes:
      - msdata:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    # 容器资源限制（R11）
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---- Strapi 后端 ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: yousen-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    environment:
      # 数据库
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-strapi}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-strapi}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-changeme}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      # 服务器
      HOST: 0.0.0.0
      PORT: 1337
      NODE_ENV: ${NODE_ENV:-production}
      # 安全密钥
      APP_KEYS: ${APP_KEYS:-key1_change_me,key2_change_me,key3_change_me,key4_change_me}
      API_TOKEN_SALT: ${API_TOKEN_SALT:-changeme_api_token_salt}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-changeme_admin_jwt_secret}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:-changeme_transfer_token_salt}
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret}
      # AI 配置加密密钥（bootstrap-health 必填校验项）
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      # Meilisearch
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-changeme_master_key_12345}
      # 文件上传
      UPLOAD_PROVIDER: ${UPLOAD_PROVIDER:-local}
      # AI 客服
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_API_ENDPOINT: ${DASHSCOPE_API_ENDPOINT:-https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation}
      QWEN_MODEL: ${QWEN_MODEL:-qwen-plus}
      QWEN_EMBEDDING_MODEL: ${QWEN_EMBEDDING_MODEL:-text-embedding-v2}
      AI_CHAT_SYSTEM_PROMPT: ${AI_CHAT_SYSTEM_PROMPT:-}
      # 微信公众号（5C 集成）
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      WECHAT_TOKEN: ${WECHAT_TOKEN:-}
      # CORS 白名单（R28，config/middlewares.ts 读取）
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      # Node 堆内存上限（R11，配合容器内存限制，预留非堆内存余量）
      NODE_OPTIONS: --max-old-space-size=768
    ports:
      - "${BACKEND_PORT:-1337}:1337"
    volumes:
      - uploads:/opt/app/public/uploads
      - ./佑森:/data/yousen:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:1337/_health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    # 容器资源限制（R11）：防止单服务 OOM 拖垮整机（服务器内存有限 + 2G swap）
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---- Next.js 前端 ----
  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
      network: host
      args:
        NEXT_PUBLIC_STRAPI_API_URL: ${NEXT_PUBLIC_STRAPI_API_URL:-http://localhost:1337}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        SENTRY_DSN: ${SENTRY_DSN:-}
        SENTRY_ORG: ${SENTRY_ORG:-}
        SENTRY_PROJECT: ${SENTRY_PROJECT:-}
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
        NEXT_PUBLIC_SENTRY_RELEASE: ${NEXT_PUBLIC_SENTRY_RELEASE:-}
    container_name: yousen-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_STRAPI_API_URL=${NEXT_PUBLIC_STRAPI_API_URL:-http://localhost:1337}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      - STRAPI_API_URL_SSR=${STRAPI_API_URL_SSR:-http://backend:1337}
      - SENTRY_DSN=${SENTRY_DSN:-}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    # 容器资源限制（R11）
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ---- 数据卷 ----
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  msdata:
    driver: local
  uploads:
    driver: local
